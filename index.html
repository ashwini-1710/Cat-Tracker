<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CAT 2026 Tracker</title>
<style>
:root {
  --bg:#0f0f13; --surface:#1a1a22; --surface2:#22222e; --border:#2e2e3e;
  --accent:#7c6af7; --accent2:#4fc3a1; --accent3:#f7956a;
  --text:#e8e6f0; --text2:#9896a8;
  --qa-bg:#1e1a3a; --qa-border:#5a52c0; --qa-tag:#a09af7;
  --varc-bg:#101e2e; --varc-border:#2d6fa8; --varc-tag:#60aee8;
  --dilr-bg:#102218; --dilr-border:#2a7a52; --dilr-tag:#4fc3a1;
  --mock-bg:#1a2a1e; --mock-border:#3a8a5a;
  --off-bg:#1e1618; --off-border:#6b3020;
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}

/* LOGIN */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 24px;width:100%;max-width:340px;text-align:center;}
.login-box h2{font-size:18px;margin-bottom:6px;color:var(--text);}
.login-box p{font-size:12px;color:var(--text2);margin-bottom:20px;line-height:1.5;}
.pin-input{display:flex;gap:10px;justify-content:center;margin-bottom:20px;}
.pin-digit{width:48px;height:56px;border:2px solid var(--border);border-radius:10px;background:var(--surface2);color:var(--text);font-size:22px;text-align:center;outline:none;transition:border-color 0.2s;}
.pin-digit:focus{border-color:var(--accent);}
.btn{width:100%;padding:12px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:opacity 0.2s;}
.btn:active{opacity:0.8;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2);margin-top:8px;}
.login-note{font-size:11px;color:var(--text2);margin-top:14px;line-height:1.6;}

/* TOPBAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;position:sticky;top:0;z-index:100;}
.topbar-row1{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.topbar h1{font-size:14px;font-weight:600;flex:1;}
.topbar h1 span{color:var(--accent);}
.streak-pill{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--accent3);font-weight:600;white-space:nowrap;}
.sync-btn{background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;padding:2px 4px;}
.sync-btn.syncing{animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.progress-bar-wrap{height:3px;background:var(--border);border-radius:2px;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width 0.4s;}

/* TABS */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);}
.tab{flex:1;padding:9px 4px;border:none;background:transparent;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--surface2);}

/* SYNC STATUS */
.sync-status{font-size:10px;color:var(--text2);text-align:center;padding:4px;background:var(--surface2);}
.sync-status.ok{color:var(--accent2);}
.sync-status.err{color:#e06060;}

/* MAIN */
.main{padding:10px 12px;max-width:700px;margin:0 auto;padding-bottom:30px;}

/* WEEK HEADER */
.week-header{display:flex;align-items:center;gap:8px;margin:14px 0 6px;}
.week-label{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;white-space:nowrap;}
.week-line{flex:1;height:1px;background:var(--border);}
.week-score{font-size:10px;color:var(--accent2);font-weight:600;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:2px 8px;white-space:nowrap;}

/* DAY CARD */
.day-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;overflow:hidden;transition:border-color 0.2s;}
.day-card.today{border-color:var(--accent);}
.day-card.all-done{border-color:#4fc3a155;background:#102218;}
.day-card.off-card{background:var(--off-bg);border-color:#6b302033;}
.day-card.mock-card{border-color:var(--mock-border);background:var(--mock-bg);}
.day-header{display:flex;align-items:center;gap:8px;padding:9px 11px;cursor:pointer;user-select:none;}
.day-date{font-size:11px;font-weight:600;color:var(--text2);min-width:88px;}
.day-date.today-lbl{color:var(--accent);}
.today-badge{background:var(--accent);color:#fff;font-size:8px;font-weight:700;padding:1px 5px;border-radius:8px;margin-left:4px;}
.day-progress{flex:1;display:flex;align-items:center;gap:6px;}
.mini-bar{flex:1;height:3px;background:var(--border);border-radius:2px;}
.mini-bar-fill{height:100%;background:var(--accent2);border-radius:2px;transition:width 0.3s;}
.day-pct{font-size:10px;color:var(--text2);min-width:26px;text-align:right;}
.chevron{color:var(--text2);font-size:11px;transition:transform 0.2s;}
.chevron.open{transform:rotate(180deg);}

/* TASKS */
.tasks{padding:0 11px 8px;display:none;}
.tasks.open{display:block;}
.task-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-top:1px solid #2e2e3e44;}
.task-row:first-child{border-top:none;}
.task-check{width:20px;height:20px;border:2px solid var(--border);border-radius:5px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all 0.15s;background:transparent;min-width:20px;}
.task-check.checked{background:var(--accent2);border-color:var(--accent2);}
.task-check.checked::after{content:'✓';color:#0f0f13;font-size:12px;font-weight:700;}
.task-body{flex:1;min-width:0;}
.task-section{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;margin-bottom:3px;letter-spacing:0.5px;}
.sec-QA{background:var(--qa-bg);color:var(--qa-tag);border:1px solid #5a52c033;}
.sec-VARC{background:var(--varc-bg);color:var(--varc-tag);border:1px solid #2d6fa833;}
.sec-DILR{background:var(--dilr-bg);color:var(--dilr-tag);border:1px solid #2a7a5233;}
.sec-MOCK{background:var(--mock-bg);color:#4fc3a1;border:1px solid #3a8a5a33;}
.task-topic{font-size:12px;font-weight:500;color:var(--text);display:block;}
.task-desc{font-size:11px;color:var(--text2);margin-top:1px;line-height:1.4;}
.task-row.done .task-topic,.task-row.done .task-desc{text-decoration:line-through;opacity:0.45;}

/* SIMPLE ROW */
.simple-row{padding:9px 11px;font-size:12px;color:var(--text2);}

/* TODAY VIEW */
.today-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);}
.today-pct{font-size:32px;font-weight:700;}

/* STATS */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px;}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center;}
.stat-val{font-size:20px;font-weight:700;color:var(--accent);}
.stat-lbl{font-size:10px;color:var(--text2);margin-top:2px;}

/* ANALYSIS */
.analysis-week{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;padding:12px;}
.aw-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.aw-title{font-size:12px;font-weight:600;}
.aw-score{font-size:18px;font-weight:700;}
.score-great{color:var(--accent2);} .score-ok{color:var(--accent3);} .score-bad{color:#e06060;}
.aw-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:10px;}
.aw-day-dot{text-align:center;}
.dot-label{font-size:9px;color:var(--text2);margin-bottom:3px;font-weight:500;}
.dot-circle{width:100%;aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;margin:0 auto;max-width:32px;}
.dot-full{background:var(--accent2);color:#0f0f13;}
.dot-partial{background:var(--accent3);color:#0f0f13;}
.dot-none{background:var(--border);color:var(--text2);}
.dot-off{background:var(--off-bg);color:var(--text2);border:1px solid #6b302033;}
.dot-future{background:var(--surface2);color:var(--text2);opacity:0.3;}
.aw-sections{display:flex;gap:6px;flex-wrap:wrap;}
.aw-sec{flex:1;min-width:60px;background:var(--surface2);border-radius:8px;padding:7px;text-align:center;}
.aw-sec-label{font-size:10px;color:var(--text2);margin-bottom:3px;}
.aw-sec-val{font-size:15px;font-weight:700;color:var(--accent);}

@media(max-width:400px){
  .stats-bar{grid-template-columns:repeat(2,1fr);}
  .stat-val{font-size:18px;}
}
</style>
</head>

const API_URL = 'https://api.anthropic.com/v1/messages';
const STORAGE_PREFIX = 'cat2026_sync_';

let userPin = null;
let localData = {};
let currentTab = 'today';
let isSyncing = false;
let pendingSync = false;

// ===== PIN HANDLING =====
const pinDigits = document.querySelectorAll('.pin-digit');
pinDigits.forEach((el, i) => {
  el.addEventListener('input', e => {
    el.value = el.value.replace(/[^0-9]/g,'').slice(-1);
    if (el.value && i < 3) pinDigits[i+1].focus();
    if (i === 3 && el.value) doLogin();
  });
  el.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !el.value && i > 0) pinDigits[i-1].focus();
  });
});

function getPin() {
  return Array.from(pinDigits).map(d => d.value).join('');
}

function showNewPin() {
  document.getElementById('loginNote').textContent = 'Pick any 4 digits as your personal PIN. Use the same PIN on all your devices to sync data.';
  pinDigits[0].focus();
}

async function doLogin() {
  const pin = getPin();
  if (pin.length !== 4) { alert('Enter all 4 digits'); return; }
  userPin = 'cat2026_user_' + pin;
  localStorage.setItem('cat2026_pin', pin);
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  await loadFromCloud();
  renderCurrentTab();
  updateTopbar();
}

// Auto-login if PIN saved
window.addEventListener('load', () => {
  const saved = localStorage.getItem('cat2026_pin');
  if (saved && saved.length === 4) {
    Array.from(pinDigits).forEach((el,i) => el.value = saved[i]);
    doLogin();
  } else {
    pinDigits[0].focus();
  }
});

// ===== CLOUD SYNC (Anthropic storage via AI messages) =====
// We store data as a JSON blob in a Claude conversation keyed by PIN
// Strategy: use claude to read/write a JSON state stored in its response

async function loadFromCloud() {
  setSyncStatus('syncing');
  try {
    const resp = await fetch(API_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: 'You are a data storage assistant. When asked to retrieve data for a key, respond with ONLY the JSON data stored for that key, or {} if nothing stored. No explanation.',
        messages: [{role:'user', content:`Retrieve stored data for key: ${userPin}`}]
      })
    });
    const result = await resp.json();
    const text = result.content?.[0]?.text || '{}';
    try {
      const cleaned = text.replace(/```json|```/g,'').trim();
      const cloud = JSON.parse(cleaned);
      localData = cloud;
    } catch { localData = {}; }
    setSyncStatus('ok', 'Synced ✓');
  } catch(e) {
    setSyncStatus('err', 'Offline — changes save locally');
    localData = JSON.parse(localStorage.getItem(userPin+'_local') || '{}');
  }
}

async function saveToCloud() {
  if (isSyncing) { pendingSync = true; return; }
  isSyncing = true;
  setSyncStatus('syncing');
  // Save locally always
  localStorage.setItem(userPin+'_local', JSON.stringify(localData));
  try {
    const dataStr = JSON.stringify(localData);
    await fetch(API_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 100,
        system: `You are a data storage assistant. You store and retrieve JSON data by key. Current stored data for key "${userPin}": ${dataStr}. When asked to save, confirm with just "saved".`,
        messages: [{role:'user', content:`Save this data for key ${userPin}: ${dataStr}`}]
      })
    });
    setSyncStatus('ok', 'Synced ✓');
  } catch(e) {
    setSyncStatus('err', 'Saved locally (offline)');
  }
  isSyncing = false;
  if (pendingSync) { pendingSync = false; saveToCloud(); }
}

function setSyncStatus(state, msg) {
  const el = document.getElementById('syncStatus');
  const btn = document.getElementById('syncBtn');
  if (state === 'syncing') {
    el.textContent = 'Syncing...'; el.className = 'sync-status';
    btn.classList.add('syncing');
  } else if (state === 'ok') {
    el.textContent = msg || 'Synced ✓'; el.className = 'sync-status ok';
    btn.classList.remove('syncing');
  } else {
    el.textContent = msg || 'Sync error'; el.className = 'sync-status err';
    btn.classList.remove('syncing');
  }
}

async function syncNow() {
  await loadFromCloud();
  renderCurrentTab();
  updateTopbar();
}

// ===== DATA HELPERS =====
function getToday() { return new Date().toISOString().split('T')[0]; }

function getDayCompletion(day) {
  if (!day.tasks) return null;
  const done = day.tasks.filter(t => localData[day.date+'_'+t.id]).length;
  return { done, total: day.tasks.length, pct: Math.round(done/day.tasks.length*100) };
}

function toggleTask(date, id) {
  const key = date+'_'+id;
  localData[key] = !localData[key];
  updateTopbar();
  updateDayCard(date);
  if (currentTab === 'today') renderToday();
  if (currentTab === 'analysis') renderAnalysis();
  saveToCloud();
}

// ===== TOPBAR =====
function updateTopbar() {
  const today = getToday();
  // streak
  let streak = 0, d = new Date(today);
  while(true) {
    const iso = d.toISOString().split('T')[0];
    const day = SCHEDULE.find(x => x.date===iso);
    if (!day) break;
    if (day.type==='off') { d.setDate(d.getDate()-1); continue; }
    const c = getDayCompletion(day);
    if (c && c.pct===100) { streak++; d.setDate(d.getDate()-1); } else break;
  }
  document.getElementById('streakPill').textContent = '🔥 '+streak+' day streak';
  // global bar
  const sd = SCHEDULE.filter(d=>d.tasks);
  const total = sd.reduce((s,d)=>s+(d.tasks?.length||0),0);
  const done = sd.reduce((s,d)=>s+d.tasks.filter(t=>localData[d.date+'_'+t.id]).length,0);
  document.getElementById('globalBar').style.width = (total?Math.round(done/total*100):0)+'%';
}

// ===== TODAY TAB =====
function renderToday() {
  const today = getToday();
  const day = SCHEDULE.find(d=>d.date===today);
  const el = document.getElementById('tab-today');
  if (!day) { el.innerHTML='<div style="padding:40px;text-align:center;color:var(--text2)">No study day today!</div>'; return; }
  if (day.type==='off') { el.innerHTML='<div style="padding:40px;text-align:center;color:var(--text2);font-size:15px">🛌 Off Day — rest up!</div>'; return; }
  const comp = getDayCompletion(day);
  let pctColor = comp.pct===100?'var(--accent2)':comp.pct>0?'var(--accent3)':'var(--text2)';
  let html = `<div class="today-header">
    <div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:2px">${day.label}</div>
      <div style="font-size:11px;color:var(--text2)">${comp.done} of ${comp.total} tasks done</div>
      ${comp.pct===100?'<div style="font-size:11px;color:var(--accent2);margin-top:3px">✓ Day complete!</div>':''}
    </div>
    <div class="today-pct" style="color:${pctColor}">${comp.pct}%</div>
  </div>`;
  html += renderTaskList(day);
  el.innerHTML = html;
}

function renderTaskList(day) {
  let html = '<div style="display:flex;flex-direction:column;gap:6px;">';
  day.tasks.forEach(t => {
    const key = day.date+'_'+t.id;
    const checked = !!localData[key];
    html += `<div class="task-row${checked?' done':''}" id="row_${key}" style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;">
      <div class="task-check${checked?' checked':''}" onclick="toggleTask('${day.date}','${t.id}')"></div>
      <div class="task-body">
        <span class="task-section sec-${t.section}">${t.section}</span>
        <span class="task-topic">${t.topic}</span>
        <span class="task-desc">${t.text}</span>
      </div>
    </div>`;
  });
  html += '</div>';
  return html;
}

// ===== FULL PLAN TAB =====
function renderAll() {
  const today = getToday();
  let html = '';
  let weekDays = [], weekNum = 0, weekStart = '';

  function flushWeek() {
    if (!weekDays.length) return;
    const sd = weekDays.filter(d=>d.tasks);
    const done = sd.reduce((s,d)=>s+d.tasks.filter(t=>localData[d.date+'_'+t.id]).length,0);
    const total = sd.reduce((s,d)=>s+(d.tasks?.length||0),0);
    const pct = total?Math.round(done/total*100):0;
    html += `<div class="week-header"><div class="week-line"></div><div class="week-label">Week ${weekNum} · ${weekStart}</div><div class="week-score">${total?pct+'% done':''}</div><div class="week-line"></div></div>`;
    weekDays.forEach(d => html += renderDayCard(d, today));
    weekDays = [];
  }

  SCHEDULE.forEach((day,i) => {
    const dow = new Date(day.date+'T00:00:00').getDay();
    if (dow===1 || i===0) { flushWeek(); weekNum++; weekStart=day.label.split(' ').slice(0,2).join(' '); }
    weekDays.push(day);
  });
  flushWeek();
  document.getElementById('tab-all').innerHTML = html;

  // scroll to today
  setTimeout(()=>{
    const el = document.getElementById('card_'+today);
    if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
  }, 100);
}

function renderDayCard(day, today) {
  const isToday = day.date===today;
  if (day.type==='off') return `<div class="day-card off-card"><div class="simple-row">🛌 ${day.label} — Off Day</div></div>`;
  const comp = getDayCompletion(day);
  const pct = comp?comp.pct:0;
  const allDone = comp&&comp.pct===100;
  let cardClass='day-card'+(isToday?' today':'')+(allDone?' all-done':'')+(day.type==='mock'?' mock-card':'');
  const isOpen = isToday;

  let taskHtml = `<div class="tasks${isOpen?' open':''}" id="tasks_${day.date}">`;
  (day.tasks||[]).forEach(t => {
    const key = day.date+'_'+t.id;
    const checked = !!localData[key];
    taskHtml += `<div class="task-row${checked?' done':''}" id="row_${key}">
      <div class="task-check${checked?' checked':''}" onclick="toggleTask('${day.date}','${t.id}')"></div>
      <div class="task-body">
        <span class="task-section sec-${t.section}">${t.section}</span>
        <span class="task-topic">${t.topic}</span>
        <span class="task-desc">${t.text}</span>
      </div>
    </div>`;
  });
  taskHtml += '</div>';

  return `<div class="${cardClass}" id="card_${day.date}">
    <div class="day-header" onclick="toggleCard('${day.date}')">
      <div class="day-date${isToday?' today-lbl':''}">${day.label}${isToday?'<span class=\'today-badge\'>TODAY</span>':''}</div>
      <div class="day-progress">
        <div class="mini-bar"><div class="mini-bar-fill" id="mbar_${day.date}" style="width:${pct}%"></div></div>
        <div class="day-pct" id="pct_${day.date}">${comp?pct+'%':(day.type==='mock'?'📝':'')}</div>
      </div>
      <div class="chevron${isOpen?' open':''}" id="chev_${day.date}">▾</div>
    </div>
    ${taskHtml}
  </div>`;
}

function toggleCard(date) {
  const t = document.getElementById('tasks_'+date);
  const c = document.getElementById('chev_'+date);
  if(t) t.classList.toggle('open');
  if(c) c.classList.toggle('open');
}

function updateDayCard(date) {
  const comp = getDayCompletion(SCHEDULE.find(d=>d.date===date));
  if(!comp) return;
  const mb = document.getElementById('mbar_'+date);
  const pc = document.getElementById('pct_'+date);
  const card = document.getElementById('card_'+date);
  if(mb) mb.style.width=comp.pct+'%';
  if(pc) pc.textContent=comp.pct+'%';
  if(card) { card.classList.toggle('all-done',comp.pct===100); }
  const day = SCHEDULE.find(d=>d.date===date);
  (day?.tasks||[]).forEach(t=>{
    const key=date+'_'+t.id;
    const row=document.getElementById('row_'+key);
    const check=row?.querySelector('.task-check');
    if(row) row.classList.toggle('done',!!localData[key]);
    if(check) check.classList.toggle('checked',!!localData[key]);
  });
}

// ===== ANALYSIS TAB =====
function renderAnalysis() {
  const today = getToday();
  const sd = SCHEDULE.filter(d=>d.tasks&&d.date<=today);
  const total = sd.reduce((s,d)=>s+(d.tasks?.length||0),0);
  const done = sd.reduce((s,d)=>s+d.tasks.filter(t=>localData[d.date+'_'+t.id]).length,0);
  const fullDays = sd.filter(d=>{const c=getDayCompletion(d);return c&&c.pct===100;}).length;
  const pct = total?Math.round(done/total*100):0;
  let streak=0, d=new Date(today);
  while(true){const iso=d.toISOString().split('T')[0];const day=SCHEDULE.find(x=>x.date===iso);if(!day)break;if(day.type==='off'){d.setDate(d.getDate()-1);continue;}const c=getDayCompletion(day);if(c&&c.pct===100){streak++;d.setDate(d.getDate()-1);}else break;}

  let html = `<div class="stats-bar">
    <div class="stat-box"><div class="stat-val">${pct}%</div><div class="stat-lbl">Overall</div></div>
    <div class="stat-box"><div class="stat-val">${streak}</div><div class="stat-lbl">🔥 Streak</div></div>
    <div class="stat-box"><div class="stat-val">${fullDays}</div><div class="stat-lbl">Full Days</div></div>
    <div class="stat-box"><div class="stat-val">${sd.length}</div><div class="stat-lbl">Days Past</div></div>
  </div>`;

  let weeks=[],wk=[],wkStart='';
  SCHEDULE.forEach((day,i)=>{
    const dow=new Date(day.date+'T00:00:00').getDay();
    if((dow===1||i===0)&&wk.length){weeks.push({days:wk,label:wkStart});wk=[];}
    if(dow===1||i===0)wkStart=day.label.split(' ').slice(0,2).join(' ');
    wk.push(day);
  });
  if(wk.length)weeks.push({days:wk,label:wkStart});

  weeks.forEach((week,wi)=>{
    const wsd=week.days.filter(d=>d.tasks);
    const wd=wsd.reduce((s,d)=>s+d.tasks.filter(t=>localData[d.date+'_'+t.id]).length,0);
    const wt=wsd.reduce((s,d)=>s+(d.tasks?.length||0),0);
    const wp=wt?Math.round(wd/wt*100):0;
    const sc=wp>=80?'score-great':wp>=50?'score-ok':'score-bad';
    const allFuture=wsd.every(d=>d.date>today);

    let dotsHtml='';
    const dnames=['S','M','T','W','T','F','S'];
    week.days.forEach(day=>{
      const dname=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date(day.date+'T00:00:00').getDay()];
      let dc,dt;
      if(day.type==='off'){dc='dot-off';dt='off';}
      else if(day.date>today){dc='dot-future';dt='—';}
      else{const c=getDayCompletion(day);if(!c){dc='dot-off';dt='—';}else if(c.pct===100){dc='dot-full';dt='✓';}else if(c.pct>0){dc='dot-partial';dt=c.pct+'%';}else{dc='dot-none';dt='✗';}}
      dotsHtml+=`<div class="aw-day-dot"><div class="dot-label">${dname}</div><div class="dot-circle ${dc}">${dt}</div></div>`;
    });

    const secs={'QA':{d:0,t:0},'VARC':{d:0,t:0},'DILR':{d:0,t:0},'MOCK':{d:0,t:0}};
    wsd.forEach(day=>{(day.tasks||[]).forEach(t=>{if(secs[t.section]){secs[t.section].t++;if(localData[day.date+'_'+t.id])secs[t.section].d++;}});});
    let secHtml='';
    Object.entries(secs).forEach(([sec,v])=>{if(!v.t)return;const sp=Math.round(v.d/v.t*100);secHtml+=`<div class="aw-sec"><div class="aw-sec-label">${sec}</div><div class="aw-sec-val">${sp}%</div></div>`;});

    html+=`<div class="analysis-week">
      <div class="aw-header">
        <div class="aw-title">Week ${wi+1} · ${week.label}</div>
        ${!allFuture?'<div class="aw-score '+sc+'">'+wp+'%</div>':'<div style="font-size:11px;color:var(--text2)">upcoming</div>'}
      </div>
      <div class="aw-grid">${dotsHtml}</div>
      ${secHtml?'<div class="aw-sections">'+secHtml+'</div>':''}
    </div>`;
  });

  document.getElementById('tab-analysis').innerHTML = html;
}

// ===== TAB SWITCHING =====
function switchTab(tab) {
  currentTab=tab;
  ['today','all','analysis'].forEach((t,i)=>{
    document.getElementById('tab-'+t).style.display=t===tab?'':'none';
    document.querySelectorAll('.tab')[i].classList.toggle('active',t===tab);
  });
  renderCurrentTab();
}
function renderCurrentTab() {
  if(currentTab==='today') renderToday();
  else if(currentTab==='all') renderAll();
  else renderAnalysis();
}
</script>
</body>
