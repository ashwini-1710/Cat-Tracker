<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>CAT 2026 Tracker</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CAT 2026">
<meta name="theme-color" content="#0f0f13">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<style>
:root{--bg:#0f0f13;--sf:#1a1a22;--sf2:#22222e;--bd:#2e2e3e;--ac:#7c6af7;--ac2:#4fc3a1;--ac3:#f7956a;--tx:#e8e6f0;--tx2:#9896a8;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}
#LS{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.lbox{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:28px 24px;width:100%;max-width:340px;text-align:center;}
.lbox h2{font-size:20px;margin-bottom:8px;}
.lbox p{font-size:12px;color:var(--tx2);margin-bottom:22px;line-height:1.6;}
.pin-row{display:flex;gap:12px;justify-content:center;margin-bottom:18px;}
.pd{width:54px;height:62px;border:2px solid var(--bd);border-radius:12px;background:var(--sf2);color:var(--tx);font-size:26px;text-align:center;outline:none;transition:border-color 0.2s;}
.pd:focus{border-color:var(--ac);}
.ebtn{width:100%;padding:13px;border:none;border-radius:10px;background:var(--ac);color:#fff;font-size:14px;font-weight:600;cursor:pointer;}
.errmsg{color:#e06060;font-size:12px;margin-top:10px;min-height:16px;}
.hint{font-size:11px;color:var(--tx2);margin-top:12px;line-height:1.7;}
.topbar{background:var(--sf);border-bottom:1px solid var(--bd);padding:10px 14px;position:sticky;top:0;z-index:100;}
.tr1{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.topbar h1{font-size:14px;font-weight:600;flex:1;}
.topbar h1 span{color:var(--ac);}
.streak{background:var(--sf2);border:1px solid var(--bd);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--ac3);font-weight:600;}
.synbtn{background:none;border:none;color:var(--tx2);font-size:20px;cursor:pointer;padding:2px 6px;}
.pbar{height:3px;background:var(--bd);border-radius:2px;}
.pbar-f{height:100%;background:linear-gradient(90deg,var(--ac),var(--ac2));border-radius:2px;transition:width .4s;}
.tabs{display:flex;background:var(--sf);border-bottom:1px solid var(--bd);}
.tab{flex:1;padding:9px 4px;border:none;background:transparent;color:var(--tx2);font-size:12px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;}
.tab.active{color:var(--ac);border-bottom-color:var(--ac);background:var(--sf2);}
.sbar{font-size:10px;text-align:center;padding:3px 8px;}
.sbar.ok{background:#102218;color:var(--ac2);}
.sbar.err{background:#1e1618;color:#e06060;}
.sbar.loading{background:#1a1a2e;color:var(--tx2);}
.main{padding:10px 12px;max-width:700px;margin:0 auto;padding-bottom:40px;}
.wkhdr{display:flex;align-items:center;gap:8px;margin:14px 0 6px;}
.wkl{font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.8px;white-space:nowrap;}
.wkln{flex:1;height:1px;background:var(--bd);}
.wksc{font-size:10px;color:var(--ac2);font-weight:600;background:var(--sf2);border:1px solid var(--bd);border-radius:10px;padding:2px 8px;}
.dc{background:var(--sf);border:1px solid var(--bd);border-radius:10px;margin-bottom:6px;overflow:hidden;}
.dc.tod{border-color:var(--ac);}
.dc.alldone{border-color:#4fc3a155;background:#102218;}
.dc.mockday{border-color:#3a8a5a;background:#1a2a1e;}
.dh{display:flex;align-items:center;gap:8px;padding:9px 11px;cursor:pointer;user-select:none;}
.ddate{font-size:11px;font-weight:600;color:var(--tx2);min-width:88px;}
.ddate.tl{color:var(--ac);}
.tbadge{background:var(--ac);color:#fff;font-size:8px;font-weight:700;padding:1px 5px;border-radius:8px;margin-left:4px;}
.dprog{flex:1;display:flex;align-items:center;gap:6px;}
.mbar{flex:1;height:3px;background:var(--bd);border-radius:2px;}
.mbarf{height:100%;background:var(--ac2);border-radius:2px;transition:width .3s;}
.dpct{font-size:10px;color:var(--tx2);min-width:26px;text-align:right;}
.chv{color:var(--tx2);font-size:11px;transition:transform .2s;}
.chv.open{transform:rotate(180deg);}
.tasks{padding:0 11px 8px;display:none;}
.tasks.open{display:block;}
.trow{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-top:1px solid #2e2e3e44;}
.trow:first-child{border-top:none;}
.ck{width:22px;height:22px;border:2px solid var(--bd);border-radius:6px;cursor:pointer;flex-shrink:0;margin-top:1px;background:transparent;min-width:22px;display:flex;align-items:center;justify-content:center;}
.ck.on{background:var(--ac2);border-color:var(--ac2);}
.ck.on::after{content:'✓';color:#0f0f13;font-size:13px;font-weight:700;}
.tbody{flex:1;min-width:0;}
.sec{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;margin-bottom:3px;}
.sQA{background:#1e1a3a;color:#a09af7;}
.sVARC{background:#101e2e;color:#60aee8;}
.sDILR{background:#102218;color:#4fc3a1;}
.sMOCK{background:#1a2a1e;color:#4fc3a1;}
.ttop{font-size:12px;font-weight:500;color:var(--tx);display:block;}
.tdesc{font-size:11px;color:var(--tx2);margin-top:1px;}
.trow.done .ttop,.trow.done .tdesc{text-decoration:line-through;opacity:.45;}
.today-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:12px;background:var(--sf);border:1px solid var(--bd);border-radius:10px;}
.today-pct{font-size:32px;font-weight:700;}
.today-list{display:flex;flex-direction:column;gap:6px;}
.tcard{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:10px 12px;display:flex;align-items:flex-start;gap:10px;}
.tcard.done{background:var(--sf2);opacity:.7;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px;}
.stb{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:10px 6px;text-align:center;}
.stv{font-size:20px;font-weight:700;color:var(--ac);}
.stl{font-size:10px;color:var(--tx2);margin-top:2px;}
.aw{background:var(--sf);border:1px solid var(--bd);border-radius:10px;margin-bottom:10px;padding:12px;}
.awh{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.awt{font-size:12px;font-weight:600;}
.awsc{font-size:18px;font-weight:700;}
.sg{color:var(--ac2);}.so{color:var(--ac3);}.sb{color:#e06060;}
.awg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:10px;}
.add{text-align:center;}
.adl{font-size:9px;color:var(--tx2);margin-bottom:3px;}
.adc{width:100%;aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;margin:0 auto;max-width:34px;}
.df{background:var(--ac2);color:#0f0f13;}.dp2{background:var(--ac3);color:#0f0f13;}.dn2{background:var(--bd);color:var(--tx2);}.dfu{background:var(--sf2);color:var(--tx2);opacity:.3;}
.awsecs{display:flex;gap:6px;flex-wrap:wrap;}
.awsec{flex:1;min-width:60px;background:var(--sf2);border-radius:8px;padding:7px;text-align:center;}
.awsl{font-size:10px;color:var(--tx2);margin-bottom:3px;}
.awsv{font-size:15px;font-weight:700;color:var(--ac);}
@media(max-width:380px){.stats{grid-template-columns:repeat(2,1fr);}}
</style>
</head>

<div id="LS">
  <div class="lbox">
    <h2>📚 CAT 2026</h2>
    <p>Enter your 4-digit PIN to sync across all devices</p>
    <div class="pin-row">
      <input class="pd" id="p0" maxlength="1" type="password" inputmode="numeric" autocomplete="off">
      <input class="pd" id="p1" maxlength="1" type="password" inputmode="numeric" autocomplete="off">

      <input class="pd" id="p3" maxlength="1" type="password" inputmode="numeric" autocomplete="off">

    <button class="ebtn" id="enterBtn">Enter</button>
    <div class="errmsg" id="errMsg"></div>
    <div class="hint">Same PIN on all devices = instant sync<br>First time? Pick any 4 digits</div>
  </div>
</div>

<div id="AS" style="display:none">

    <div class="tr1">

      <button class="synbtn" id="syncBtn">⟳</button>

    <div class="pbar"><div class="pbar-f" id="pbarF" style="width:0%"></div></div>
  </div>
  <div class="sbar loading" id="sbarEl">Connecting...</div>

    <button class="tab active" id="t0">Today</button>
    <button class="tab" id="t1">Full Plan</button>
    <button class="tab" id="t2">Analysis</button>
  </div>
  <div class="main">
    <div id="p0x"></div>
    <div id="p1x" style="display:none"></div>
    <div id="p2x" style="display:none"></div>
  </div>
</div>

var FB_URL = 'https://cat-tracker-976ff-default-rtdb.firebaseio.com';
var LD = {}, userPin = null, curTab = 0, syncTimer = null;

// PIN setup
var pEls = ['p0','p1','p2','p3'].map(function(id){ return document.getElementById(id); });

pEls.forEach(function(el, i) {
  el.addEventListener('input', function() {
    this.value = this.value.replace(/[^0-9]/g,'').slice(-1);
    if (this.value && i < 3) pEls[i+1].focus();
    if (i === 3 && this.value) login();
  });
  el.addEventListener('keydown', function(e) {
    if (e.key==='Backspace' && !this.value && i>0) pEls[i-1].focus();
    if (e.key==='Enter') login();
  });
});

document.getElementById('enterBtn').addEventListener('click', login);
document.getElementById('syncBtn').addEventListener('click', function(){ loadData(true); });
document.getElementById('t0').addEventListener('click', function(){ switchTab(0); });
document.getElementById('t1').addEventListener('click', function(){ switchTab(1); });
document.getElementById('t2').addEventListener('click', function(){ switchTab(2); });

// Auto-login
var saved = localStorage.getItem('cat2026_pin');
if (saved && saved.length===4) {
  pEls.forEach(function(e,i){ e.value=saved[i]; });
  setTimeout(login, 100);
} else {
  pEls[0].focus();
}

function login() {
  var pin = pEls.map(function(e){ return e.value; }).join('');
  if (pin.length!==4) { document.getElementById('errMsg').textContent='Enter all 4 digits'; return; }
  userPin = pin;
  localStorage.setItem('cat2026_pin', pin);
  document.getElementById('LS').style.display = 'none';
  document.getElementById('AS').style.display = 'block';
  loadData(false);
  // Poll every 10s for live sync
  syncTimer = setInterval(function(){ loadData(false); }, 10000);
}

// Firebase REST API - no SDK needed
function fbGet() {
  return fetch(FB_URL + '/users/' + userPin + '/tasks.json')
    .then(function(r){ return r.json(); });
}
function fbSet(key, val) {
  var obj = {}; obj[key] = val;
  return fetch(FB_URL + '/users/' + userPin + '/tasks.json', {
    method: 'PATCH',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(obj)
  });
}

function loadData(showMsg) {
  if(showMsg) setSbar('loading','Syncing...');
  fbGet().then(function(data) {
    var prev = JSON.stringify(LD);
    LD = data || {};
    localStorage.setItem('cat_bk_'+userPin, JSON.stringify(LD));
    setSbar('ok','🟢 Synced — live across all devices');
    if (JSON.stringify(LD) !== prev) { updateTop(); renderCur(); }
    else { updateTop(); }
  }).catch(function() {
    setSbar('err','Offline — saved locally');
    LD = JSON.parse(localStorage.getItem('cat_bk_'+userPin)||'{}');
    updateTop(); renderCur();
  });
}

function toggleTask(dt, id) {
  var key = dt+'_'+id;
  LD[key] = !LD[key];
  localStorage.setItem('cat_bk_'+userPin, JSON.stringify(LD));
  // Update UI immediately
  var row = document.getElementById('r_'+key);
  var ck = row ? row.querySelector('.ck') : null;
  if(row) row.classList.toggle('done', !!LD[key]);
  if(ck) ck.classList.toggle('on', !!LD[key]);
  updateDayCard(dt);
  updateTop();
  if(curTab===0) renderToday();
  if(curTab===2) renderAna();
  // Save to Firebase
  fbSet(key, LD[key]);
}

function setSbar(st,msg){ var e=document.getElementById('sbarEl'); e.textContent=msg; e.className='sbar '+st; }
function getToday(){ return new Date().toISOString().split('T')[0]; }
function getDC(day){
  if(!day.tasks) return null;
  var dn=day.tasks.filter(function(t){return LD[day.date+'_'+t.id];}).length;
  return {done:dn,total:day.tasks.length,pct:Math.round(dn/day.tasks.length*100)};
}

function updateTop(){
  var today=getToday(), streak=0, d=new Date(today);
  while(true){
    var iso=d.toISOString().split('T')[0];
    var day=SCH.find(function(x){return x.date===iso;});
    if(!day) break;
    var c=getDC(day);
    if(c&&c.pct===100){streak++;d.setDate(d.getDate()-1);}else break;
  }
  document.getElementById('streakEl').textContent='🔥 '+streak+' streak';
  var tot=0,dn=0;
  SCH.forEach(function(d){if(d.tasks){tot+=d.tasks.length;d.tasks.forEach(function(t){if(LD[d.date+'_'+t.id])dn++;});}});
  document.getElementById('pbarF').style.width=(tot?Math.round(dn/tot*100):0)+'%';
}

function updateDayCard(dt){
  var day=SCH.find(function(d){return d.date===dt;}); if(!day) return;
  var c=getDC(day); if(!c) return;
  var mb=document.getElementById('mb_'+dt), pp=document.getElementById('pp_'+dt), cd=document.getElementById('cd_'+dt);
  if(mb) mb.style.width=c.pct+'%';
  if(pp) pp.textContent=c.pct+'%';
  if(cd) cd.classList.toggle('alldone',c.pct===100);
}

function renderToday(){
  var today=getToday(), el=document.getElementById('p0x');
  var day=SCH.find(function(d){return d.date===today;});
  if(!day){el.innerHTML='<div style="padding:40px;text-align:center;color:var(--tx2)">No study day today!</div>';return;}
  var c=getDC(day);
  var pc=c.pct===100?'var(--ac2)':c.pct>0?'var(--ac3)':'var(--tx2)';
  var h='<div class="today-hdr"><div><div style="font-size:13px;color:var(--tx2);margin-bottom:2px">'+day.label+'</div>';
  h+='<div style="font-size:11px;color:var(--tx2)">'+c.done+' of '+c.total+' done</div>';
  if(c.pct===100) h+='<div style="font-size:11px;color:var(--ac2);margin-top:3px">✓ Great work!</div>';
  h+='</div><div class="today-pct" style="color:'+pc+'">'+c.pct+'%</div></div><div class="today-list">';
  day.tasks.forEach(function(t){
    var key=day.date+'_'+t.id, chk=!!LD[key];
    h+='<div class="tcard'+(chk?' done':'')+'" id="r_'+key+'">';
    h+='<div class="ck'+(chk?' on':'')+'" data-dt="'+day.date+'" data-id="'+t.id+'"></div>';
    h+='<div class="tbody"><span class="sec s'+t.section+'">'+t.section+'</span>';
    h+='<span class="ttop">'+t.topic+'</span><span class="tdesc">'+t.text+'</span></div></div>';
  });
  h+='</div>';
  el.innerHTML=h;
  el.querySelectorAll('.ck').forEach(function(ck){
    ck.addEventListener('click',function(){toggleTask(this.dataset.dt,this.dataset.id);});
  });
}

function renderAll(){
  var today=getToday(),h='',wdays=[],wn=0,ws='';
  function flush(){
    if(!wdays.length) return;
    var sd=wdays.filter(function(d){return d.tasks;});
    var dn=0,tot=0;
    sd.forEach(function(d){tot+=d.tasks.length;d.tasks.forEach(function(t){if(LD[d.date+'_'+t.id])dn++;});});
    var pct=tot?Math.round(dn/tot*100):0;
    h+='<div class="wkhdr"><div class="wkln"></div><div class="wkl">Week '+wn+' · '+ws+'</div><div class="wksc">'+(tot?pct+'% done':'')+'</div><div class="wkln"></div></div>';
    wdays.forEach(function(d){h+=renderCard(d,today);});
    wdays=[];
  }
  SCH.forEach(function(day,i){
    var dow=new Date(day.date+'T00:00:00').getDay();
    if((dow===1||i===0)&&wdays.length){flush();wn++;ws=day.label.split(' ').slice(0,2).join(' ');}
    if(wn===0){wn=1;ws=day.label.split(' ').slice(0,2).join(' ');}
    wdays.push(day);
  });
  flush();
  var el=document.getElementById('p1x'); el.innerHTML=h;
  el.querySelectorAll('.ck').forEach(function(ck){
    ck.addEventListener('click',function(){toggleTask(this.dataset.dt,this.dataset.id);});
  });
  el.querySelectorAll('.dh').forEach(function(dh){
    dh.addEventListener('click',function(){
      var dt=this.dataset.dt;
      var t=document.getElementById('tk_'+dt), c=document.getElementById('cv_'+dt);
      if(t)t.classList.toggle('open'); if(c)c.classList.toggle('open');
    });
  });
  setTimeout(function(){
    var e=document.getElementById('cd_'+today);
    if(e) e.scrollIntoView({behavior:'smooth',block:'center'});
  },100);
}

function renderCard(day,today){

  });
  th+='</div>';
  var h='<div class="'+cls+'" id="cd_'+day.date+'">';
  h+='<div class="dh" data-dt="'+day.date+'">';
  h+='<div class="ddate'+(isT?' tl':'')+'">';
  h+=day.label+(isT?'<span class="tbadge">TODAY</span>':'');
  h+='</div><div class="dprog"><div class="mbar"><div class="mbarf" id="mb_'+day.date+'" style="width:'+pct+'%"></div></div>';
  h+='<div class="dpct" id="pp_'+day.date+'">'+(c?pct+'%':(day.type==='mock'?'📝':''))+'</div></div>';
  h+='<div class="chv'+(isOpen?' open':'')+'" id="cv_'+day.date+'">▾</div></div>';
  h+=th+'</div>';
  return h;
}

function renderAna(){
  var today=getToday();
  var sd=SCH.filter(function(d){return d.tasks&&d.date<=today;});
  var tot=0,dn=0,fd=0;
  sd.forEach(function(d){tot+=d.tasks.length;var x=0;d.tasks.forEach(function(t){if(LD[d.date+'_'+t.id]){dn++;x++;}});if(x===d.tasks.length)fd++;});
  var pct=tot?Math.round(dn/tot*100):0;
  var streak=0,d=new Date(today);
  while(true){var iso=d.toISOString().split('T')[0];var day=SCH.find(function(x){return x.date===iso;});if(!day)break;var c=getDC(day);if(c&&c.pct===100){streak++;d.setDate(d.getDate()-1);}else break;}
  var h='<div class="stats"><div class="stb"><div class="stv">'+pct+'%</div><div class="stl">Overall</div></div><div class="stb"><div class="stv">'+streak+'</div><div class="stl">🔥 Streak</div></div><div class="stb"><div class="stv">'+fd+'</div><div class="stl">Full Days</div></div><div class="stb"><div class="stv">'+sd.length+'</div><div class="stl">Days Past</div></div></div>';
  var weeks=[],wk=[],ws='';
  SCH.forEach(function(day,i){var dow=new Date(day.date+'T00:00:00').getDay();if((dow===1||i===0)&&wk.length){weeks.push({days:wk,label:ws});wk=[];}if(dow===1||i===0)ws=day.label.split(' ').slice(0,2).join(' ');wk.push(day);});
  if(wk.length)weeks.push({days:wk,label:ws});
  weeks.forEach(function(week,wi){
    var wsd=week.days.filter(function(d){return d.tasks;});
    var wd=0,wt=0;
    wsd.forEach(function(d){wt+=d.tasks.length;d.tasks.forEach(function(t){if(LD[d.date+'_'+t.id])wd++;});});
    var wp=wt?Math.round(wd/wt*100):0;
    var sc=wp>=80?'sg':wp>=50?'so':'sb';
    var af=wsd.every(function(d){return d.date>today;});
    var dh='';
    week.days.forEach(function(day){
      var dname=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date(day.date+'T00:00:00').getDay()];
      var dc,dt2;
      if(day.date>today){dc='dfu';dt2='—';}
      else{var c=getDC(day);if(!c){dc='dfu';dt2='—';}else if(c.pct===100){dc='df';dt2='✓';}else if(c.pct>0){dc='dp2';dt2=c.pct+'%';}else{dc='dn2';dt2='✗';}}
      dh+='<div class="add"><div class="adl">'+dname+'</div><div class="adc '+dc+'">'+dt2+'</div></div>';
    });
    var secs={QA:{d:0,t:0},VARC:{d:0,t:0},DILR:{d:0,t:0},MOCK:{d:0,t:0}};
    wsd.forEach(function(day){(day.tasks||[]).forEach(function(t){if(secs[t.section]){secs[t.section].t++;if(LD[day.date+'_'+t.id])secs[t.section].d++;}});});
    var sh='';
    Object.keys(secs).forEach(function(sec){var v=secs[sec];if(!v.t)return;sh+='<div class="awsec"><div class="awsl">'+sec+'</div><div class="awsv">'+Math.round(v.d/v.t*100)+'%</div></div>';});
    h+='<div class="aw"><div class="awh"><div class="awt">Week '+(wi+1)+' · '+week.label+'</div>'+(af?'<div style="font-size:11px;color:var(--tx2)">upcoming</div>':'<div class="awsc '+sc+'">'+wp+'%</div>')+'</div><div class="awg">'+dh+'</div>'+(sh?'<div class="awsecs">'+sh+'</div>':'')+'</div>';
  });
  document.getElementById('p2x').innerHTML=h;
}

function switchTab(n){
  curTab=n;
  ['p0x','p1x','p2x'].forEach(function(id,i){document.getElementById(id).style.display=i===n?'':'none';});
  ['t0','t1','t2'].forEach(function(id,i){document.getElementById(id).classList.toggle('active',i===n);});
  renderCur();
}
function renderCur(){if(curTab===0)renderToday();else if(curTab===1)renderAll();else renderAna();}

// PWA install
var dp;
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();dp=e;
  setTimeout(function(){
    if(dp&&document.getElementById('AS').style.display!=='none'){
      var b=document.createElement('div');
      b.style.cssText='position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#1a1a22;border-top:1px solid #7c6af7;padding:12px 16px;display:flex;align-items:center;gap:12px;';
      b.innerHTML='<div style="flex:1"><div style="font-size:13px;font-weight:600;color:#e8e6f0">Install as App</div><div style="font-size:11px;color:#9896a8">No browser bar</div></div>';
      var ib=document.createElement('button');
      ib.textContent='Install';ib.style.cssText='background:#7c6af7;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;';
      ib.addEventListener('click',function(){dp.prompt();dp.userChoice.then(function(){dp=null;b.remove();});});
      var cb=document.createElement('button');
      cb.textContent='✕';cb.style.cssText='background:none;border:none;color:#9896a8;font-size:20px;cursor:pointer;';
      cb.addEventListener('click',function(){b.remove();});
      b.appendChild(ib);b.appendChild(cb);document.body.appendChild(b);
    }
  },3000);
});
</script>
